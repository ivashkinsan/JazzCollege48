<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Градиент для золотого акцента -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C85A" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8942E" />
    </linearGradient>
    
    <!-- Тень для глубины -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Фон -->
  <rect width="400" height="400" fill="#0a0a0a" rx="40" />

  <!-- Декоративный круг -->
  <circle cx="200" cy="150" r="95" fill="none" stroke="url(#goldGradient)" stroke-width="3" filter="url(#shadow)" />
  
  <!-- Виниловая пластинка / нотный символ -->
  <circle cx="200" cy="150" r="75" fill="none" stroke="url(#goldGradient)" stroke-width="1.5" opacity="0.6" />
  <circle cx="200" cy="150" r="55" fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.4" />
  
  <!-- Центральная точка пластинки -->
  <circle cx="200" cy="150" r="12" fill="url(#goldGradient)" />

  <!-- Музыкальная нота (восьмая нота) -->
  <g transform="translate(200, 150)" filter="url(#shadow)">
    <!-- Нотная головка -->
    <ellipse cx="-15" cy="20" rx="12" ry="8" fill="url(#goldGradient)" transform="rotate(-20 -15 20)" />
    <ellipse cx="15" cy="20" rx="12" ry="8" fill="url(#goldGradient)" transform="rotate(-20 15 20)" />
    
    <!-- Штили -->
    <line x1="-8" y1="18" x2="-8" y2="-30" stroke="url(#goldGradient)" stroke-width="3" stroke-linecap="round" />
    <line x1="22" y1="18" x2="22" y2="-30" stroke="url(#goldGradient)" stroke-width="3" stroke-linecap="round" />
    
    <!-- Связка (балка) -->
    <polygon points="-8,-30 22,-30 22,-22 -8,-22" fill="url(#goldGradient)" />
  </g>

  <!-- Название колледжа -->
  <text x="200" y="290" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="24" 
        font-weight="bold" 
        fill="url(#goldGradient)" 
        text-anchor="middle" 
        letter-spacing="2">
    ЛОКИ
  </text>
  
  <!-- Подзаголовок -->
  <text x="200" y="320" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="14" 
        font-weight="normal" 
        fill="#D4AF37" 
        text-anchor="middle" 
        letter-spacing="1" 
        opacity="0.9">
    им. К.Н. Игумнова
  </text>

  <!-- Эстрадное отделение -->
  <text x="200" y="350" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="12" 
        font-weight="normal" 
        fill="#B0B0B0" 
        text-anchor="middle" 
        letter-spacing="3">
    ЭСТРАДНО-ДЖАЗОВОЕ ОТДЕЛЕНИЕ
  </text>

  <!-- Декоративные линии -->
  <line x1="120" y1="265" x2="280" y2="265" stroke="url(#goldGradient)" stroke-width="1" opacity="0.5" />
  <line x1="120" y1="335" x2="280" y2="335" stroke="url(#goldGradient)" stroke-width="1" opacity="0.3" />
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300" fill="none">
  <defs>
    <!-- Градиент для фона -->
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    
    <!-- Градиент золотой -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C85A"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8942E"/>
    </linearGradient>
    
    <!-- Градиент фиолетовый -->
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7e14ff"/>
    </linearGradient>
    
    <!-- Свечение -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Основной круг -->
  <circle cx="150" cy="150" r="145" fill="url(#bgGradient)" stroke="url(#goldGradient)" stroke-width="3"/>
  <circle cx="150" cy="150" r="135" fill="none" stroke="url(#purpleGradient)" stroke-width="1" opacity="0.5"/>
  
  <!-- Абстрактные световые лучи (в стиле favicon) -->
  <g opacity="0.4">
    <ellipse cx="150" cy="80" rx="3" ry="40" fill="url(#purpleGradient)" transform="rotate(30 150 80)" filter="url(#glow)"/>
    <ellipse cx="150" cy="80" rx="2" ry="30" fill="#ede6ff" transform="rotate(30 150 80)"/>
    
    <ellipse cx="220" cy="150" rx="3" ry="35" fill="url(#purpleGradient)" transform="rotate(90 220 150)" filter="url(#glow)"/>
    <ellipse cx="220" cy="150" rx="2" ry="25" fill="#47bfff" transform="rotate(90 220 150)"/>
    
    <ellipse cx="80" cy="150" rx="3" ry="35" fill="url(#purpleGradient)" transform="rotate(90 80 150)" filter="url(#glow)"/>
    <ellipse cx="80" cy="150" rx="2" ry="25" fill="#ede6ff" transform="rotate(90 80 150)"/>
  </g>
  
  <!-- Музыкальная нота (восьмая) - центральная -->
  <g transform="translate(150, 150)" filter="url(#glow)">
    <!-- Головка ноты -->
    <ellipse cx="-20" cy="30" rx="14" ry="12" fill="url(#goldGradient)" transform="rotate(-25 -20 30)"/>
    <ellipse cx="-20" cy="30" rx="9" ry="7" fill="#0a0a0a" transform="rotate(-25 -20 30)"/>
    
    <!-- Штиль -->
    <line x1="-8" y1="24" x2="-8" y2="-45" stroke="url(#goldGradient)" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Флаг (хвостик) -->
    <path d="M-8 -45 Q 25 -55 40 -30 Q 30 -10 -8 -20" fill="url(#goldGradient)"/>
  </g>
  
  <!-- Декоративные элементы - звуковые волны -->
  <g stroke="url(#purpleGradient)" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 60 150 Q 75 150 82 142" stroke-linecap="round">
      <animate attributeName="d" values="M 60 150 Q 75 150 82 142; M 60 150 Q 75 150 82 158; M 60 150 Q 75 150 82 142" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 50 150 Q 68 150 76 138" stroke-linecap="round">
      <animate attributeName="d" values="M 50 150 Q 68 150 76 138; M 50 150 Q 68 150 76 162; M 50 150 Q 68 150 76 138" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 240 150 Q 225 150 218 142" stroke-linecap="round">
      <animate attributeName="d" values="M 240 150 Q 225 150 218 142; M 240 150 Q 225 150 218 158; M 240 150 Q 225 150 218 142" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 250 150 Q 232 150 224 138" stroke-linecap="round">
      <animate attributeName="d" values="M 250 150 Q 232 150 224 138; M 250 150 Q 232 150 224 162; M 250 150 Q 232 150 224 138" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Звёзды/блики -->
  <g fill="#D4AF37" filter="url(#glow)">
    <circle cx="200" cy="70" r="2.5"/>
    <circle cx="215" cy="85" r="2"/>
    <circle cx="100" cy="65" r="2"/>
    <circle cx="85" cy="80" r="1.5"/>
    <circle cx="230" cy="200" r="1.5"/>
    <circle cx="70" cy="210" r="2"/>
  </g>
  
  <!-- Верхний текст -->
  <defs>
    <path id="topText" d="M 55 100 A 95 95 0 0 1 245 100"/>
  </defs>
  <text fill="url(#goldGradient)" font-size="12" font-family="Arial, sans-serif" font-weight="700" letter-spacing="3">
    <textPath href="#topText" startOffset="50%" text-anchor="middle">
      ЭСТРАДНОЕ ОТДЕЛЕНИЕ
    </textPath>
  </text>
  
  <!-- Нижний текст -->
  <defs>
    <path id="bottomText" d="M 70 210 A 85 85 0 0 1 230 210"/>
  </defs>
  <text fill="#b0b0b0" font-size="9" font-family="Arial, sans-serif" letter-spacing="1">
    <textPath href="#bottomText" startOffset="50%" text-anchor="middle">
      ЛОКИ им. К.Н. ИГУМНОВА
    </textPath>
  </text>
  
  <!-- Год основания -->
  <text x="150" y="240" fill="url(#goldGradient)" font-size="11" font-family="Arial, sans-serif" text-anchor="middle" font-weight="700" letter-spacing="2">
    С 1981
  </text>
  
  <!-- Декоративная линия -->
  <line x1="100" y1="225" x2="200" y2="225" stroke="url(#goldGradient)" stroke-width="1" opacity="0.5"/>
</svg>

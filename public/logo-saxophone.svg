<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="saxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F4D03F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="saxGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9A7B0A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Musical staff lines -->
  <g stroke="url(#saxGradient)" stroke-width="1.5" opacity="0.8">
    <path d="M 80 120 Q 150 140, 280 100" fill="none"/>
    <path d="M 85 135 Q 155 155, 285 115" fill="none"/>
    <path d="M 90 150 Q 160 170, 290 130" fill="none"/>
    <path d="M 95 165 Q 165 185, 295 145" fill="none"/>
    <path d="M 100 180 Q 170 200, 300 160" fill="none"/>
  </g>
  
  <!-- Saxophone body (main curved part) -->
  <path d="M 180 80 
           Q 175 120, 170 150 
           Q 165 180, 175 200 
           Q 185 220, 210 230 
           Q 240 240, 260 220 
           Q 275 200, 270 170 
           Q 265 140, 255 120 
           Q 245 100, 220 95 
           Q 200 90, 180 80 Z" 
        fill="url(#saxGradient)" 
        stroke="#B8860B" 
        stroke-width="1"/>
  
  <!-- Saxophone bell (bottom opening) -->
  <ellipse cx="235" cy="215" rx="25" ry="18" fill="url(#saxGradientDark)" stroke="#9A7B0A" stroke-width="1.5"/>
  <ellipse cx="238" cy="212" rx="18" ry="12" fill="#F4D03F" opacity="0.6"/>
  
  <!-- Saxophone neck (top curved part) -->
  <path d="M 195 85 
           Q 200 70, 210 65 
           Q 220 60, 230 62 
           L 235 63 
           L 232 75 
           Q 225 73, 215 77 
           Q 205 82, 200 95 
           Z" 
        fill="url(#saxGradient)" 
        stroke="#B8860B" 
        stroke-width="1"/>
  
  <!-- Mouthpiece (dark red/burgundy) -->
  <path d="M 228 62 L 245 58 L 248 65 L 235 68 Z" fill="#800020" stroke="#500015" stroke-width="0.5"/>
  
  <!-- Saxophone keys/buttons -->
  <circle cx="195" cy="140" r="4" fill="#D4AF37" stroke="#9A7B0A" stroke-width="1"/>
  <circle cx="200" cy="160" r="4" fill="#D4AF37" stroke="#9A7B0A" stroke-width="1"/>
  <circle cx="210" cy="180" r="4" fill="#D4AF37" stroke="#9A7B0A" stroke-width="1"/>
  
  <!-- Key mechanisms -->
  <path d="M 195 140 Q 200 150, 200 160" stroke="#9A7B0A" stroke-width="1.5" fill="none"/>
  <path d="M 200 160 Q 205 170, 210 180" stroke="#9A7B0A" stroke-width="1.5" fill="none"/>
  
  <!-- Musical notes -->
  <!-- Note 1 (left side) -->
  <path d="M 120 130 L 120 155 Q 120 160, 128 158 L 140 155 L 140 130" 
        fill="url(#saxGradient)" 
        stroke="#B8860B" 
        stroke-width="1"/>
  <ellipse cx="130" cy="158" rx="8" ry="5" fill="url(#saxGradient)" stroke="#B8860B" stroke-width="1" transform="rotate(-15 130 158)"/>
  
  <!-- Note 2 (top center) -->
  <path d="M 190 70 L 190 90" stroke="url(#saxGradient)" stroke-width="2"/>
  <path d="M 190 70 L 205 75 L 205 95 L 190 90" fill="url(#saxGradient)" stroke="#B8860B" stroke-width="1"/>
  <ellipse cx="197.5" cy="92.5" rx="7" ry="5" fill="url(#saxGradient)" stroke="#B8860B" stroke-width="1"/>
  
  <!-- Note 3 (center) -->
  <path d="M 220 110 L 220 130" stroke="url(#saxGradient)" stroke-width="2"/>
  <path d="M 220 110 L 235 115 L 235 135 L 220 130" fill="url(#saxGradient)" stroke="#B8860B" stroke-width="1"/>
  <ellipse cx="227.5" cy="132.5" rx="7" ry="5" fill="url(#saxGradient)" stroke="#B8860B" stroke-width="1"/>
  
  <!-- Note 4 (right side, eighth note) -->
  <path d="M 260 90 L 260 115" stroke="url(#saxGradient)" stroke-width="2"/>
  <path d="M 260 90 Q 275 85, 275 95 L 260 100" fill="url(#saxGradient)" stroke="#B8860B" stroke-width="1"/>
  <ellipse cx="267.5" cy="112.5" rx="7" ry="5" fill="url(#saxGradient)" stroke="#B8860B" stroke-width="1"/>
  
  <!-- Note 5 (bottom right, smaller) -->
  <path d="M 280 170 L 280 185" stroke="url(#saxGradient)" stroke-width="1.5"/>
  <path d="M 280 170 L 292 174 L 292 188 L 280 185" fill="url(#saxGradient)" stroke="#B8860B" stroke-width="0.8"/>
  <ellipse cx="286" cy="186.5" rx="5" ry="3.5" fill="url(#saxGradient)" stroke="#B8860B" stroke-width="0.8"/>
  
  <!-- Treble clef symbol (simplified) -->
  <path d="M 150 145 Q 155 140, 160 145 Q 165 150, 160 160 Q 155 170, 150 165 Q 145 160, 150 150" 
        fill="none" 
        stroke="url(#saxGradient)" 
        stroke-width="2"/>
  <circle cx="155" cy="147" r="3" fill="url(#saxGradient)"/>
</svg>
